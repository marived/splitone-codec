model:
  base_channels: 32
  latent_dim:    256
  strides:       [2, 4, 5, 8]
  n_codebooks:   8
  codebook_size: 1024

optim:
  lr:            2.0e-4
  betas:         [0.5, 0.9]
  weight_decay:  0.0

data:
  manifest:        data/manifests/libritts_aishell.tsv
  segment_seconds: 2.0
  batch_size:      24

train:
  epochs:     200
  log_every:  100
  save_every: 10000
