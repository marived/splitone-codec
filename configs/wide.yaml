model:
  base_channels: 48
  latent_dim:    384
  strides:       [2, 4, 5, 8]
  n_codebooks:   8
  codebook_size: 1024

optim:
  lr:            1.0e-4
  betas:         [0.5, 0.9]

data:
  manifest:        data/manifests/libritts_aishell.tsv
  segment_seconds: 2.0
  batch_size:      16

train:
  epochs:     250
  log_every:  100
  save_every: 10000
