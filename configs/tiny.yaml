model:
  base_channels: 16
  latent_dim:    128
  strides:       [2, 4, 5, 8]
  n_codebooks:   1
  codebook_size: 1024

optim:
  lr:            3.0e-4
  betas:         [0.5, 0.9]

data:
  manifest:        data/manifests/tiny.tsv
  segment_seconds: 1.0
  batch_size:      16

train:
  epochs:     50
  log_every:  100
  save_every: 5000
